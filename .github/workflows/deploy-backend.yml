name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="$HOME/Whatsapp_Message_Sender_Full_Stack"
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "App directory missing. Run ec2-bootstrap.sh on the server first."
              exit 1
            fi
            cd "$APP_DIR"
            git fetch origin main
            git reset --hard origin/main
            cd backend
            chmod +x deploy-aws.sh
            ./deploy-aws.sh
